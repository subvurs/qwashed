#
# CI matrix for Qwashed.
#
# Jobs:
#   - lint:        ruff check + ruff format --check
#   - typecheck:   mypy --strict on qwashed/
#   - test:        pytest across (3.11, 3.12, 3.13) x (ubuntu-latest, macos-14)
#   - test-no-net: pytest with network disabled to enforce no-telemetry policy
#
# macos-14 is the Apple Silicon (arm64) runner. Linux is x86_64.
# Windows is best-effort and not in CI for v0.1.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check qwashed tests

      - name: Ruff format check
        run: ruff format --check qwashed tests

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package + dev
        run: |
          python -m pip install --upgrade pip
          # Install with full extras so mypy sees all third-party stubs.
          pip install -e ".[dev,full]" || pip install -e ".[dev]"

      - name: mypy
        run: mypy qwashed

  test:
    name: Test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: System deps (liboqs from source)
        run: |
          # liboqs-python is a thin ctypes wrapper around the upstream
          # liboqs C library — it does NOT bundle liboqs.{so,dylib}.
          # Ubuntu does not ship liboqs in its main repos, and Homebrew's
          # liboqs bottle on macos-14 lands in /opt/homebrew/Cellar but
          # the symlink into /opt/homebrew/lib is not always created
          # (the loader then falls back to its self-install path which
          # cannot write to /opt/homebrew without sudo).
          #
          # Building from source to /usr/local/{lib,include} is the most
          # deterministic option across both runners: /usr/local/lib is
          # on the default dlopen search path on macOS and the default
          # ld.so search path on Linux (after `ldconfig`). The pinned
          # 0.14.0 tag matches the liboqs-python>=0.14.0 extras pin in
          # pyproject.toml.
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build libssl-dev git
          else
            brew install cmake ninja
          fi
          git clone --depth 1 --branch 0.14.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -GNinja -S /tmp/liboqs -B /tmp/liboqs/build \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/liboqs/build --parallel
          sudo cmake --install /tmp/liboqs/build
          if [ "$RUNNER_OS" = "Linux" ]; then sudo ldconfig; fi
          # Pin OQS_INSTALL_PATH so the loader probes /usr/local/lib
          # directly instead of relying on ctypes.util.find_library()'s
          # heuristics (which differ across Python builds and SIP
          # configurations on macOS).
          echo "OQS_INSTALL_PATH=/usr/local" >> "$GITHUB_ENV"

      - name: Install Qwashed with full extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,full]"

      - name: pytest
        run: pytest -ra --cov=qwashed --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: .coverage
          if-no-files-found: ignore

  test-no-net:
    name: No-network test (telemetry policy enforcement)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Qwashed (core only, no audit/vault network deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run core tests with network disabled
        # Use a deny-all firewall via unshare. Tests marked `network` are
        # excluded; everything else MUST pass without any outbound connection.
        run: |
          pytest -ra -m "not network" tests/
        env:
          # Belt-and-suspenders: also clear common proxy variables so any
          # accidental urllib usage cannot reach a corporate proxy.
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          NO_PROXY: "*"
